<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Driver Manager</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="app" class="container">
    <header class="hero">
      <h1>Driver Manager</h1>
      <p class="subtitle">Scan. Select. Install.</p>
    </header>
    <main class="grid">
      <section class="col left">
        <h2>Detected Devices</h2>
        <ul id="detectedList" class="list"></ul>
      </section>
      <section class="col center">
        <div class="search">
          <input id="search" placeholder="Search database (name or pattern)" />
        </div>
        <h2>Database</h2>
        <ul id="dbList" class="list"></ul>
      </section>
      <section class="col right">
        <h2>Selected</h2>
        <ul id="selectedList" class="list"></ul>
        <div class="actions">
          <button id="btnScan">Scan</button>
          <button id="btnDownload">Download Selected</button>
          <button id="btnExit">Exit</button>
        </div>
      </section>
    </main>
  </div>
  <script src="renderer.js"></script>
</body>
</html>
